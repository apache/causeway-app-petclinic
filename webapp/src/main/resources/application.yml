#
# Recommend use for static configuration that does not change between environments.
#
# See also config/application.properties
#
causeway:

  applib:
    annotation:
      action:
        command-publishing: all
        execution-publishing: all
      action-layout:
        css-class:
          patterns:
            delete.*:btn-danger,
            discard.*:btn-warning,
            remove.*:btn-warning
      property:
        command-publishing: all
        execution-publishing: all
      domain-object:
        editing: false
        entity-change-publishing: all
  core:
    meta-model:
      introspector:
        lock-after-full-introspection: true
        mode: full
      validator:
        allow-deprecated: false

    runtime-services:
      translation:
        po:
          mode: disabled

  viewer:
    common:
      application:
        about: PetClinic
        brand-logo-signin: images/apache-causeway/logo-banner-591x120.png
        brand-logo-header: images/apache-causeway/logo-65x48.png
        favicon-url: images/favicon.png
        menubars-layout-file: menubars.layout.xml
        name: PetClinic
        # https://stackoverflow.com/a/38983935/56880
        version: @project.version@
      credit:
        - image: images/apache-causeway/logo-65x48.png
          name: Apache Causeway
          url: https://causeway.apache.org
    wicket:
      css: css/application.css
      js: scripts/application.js

      bookmarked-pages:
        show-chooser: true
        show-drop-down-on-footer: true

      max-title-length-in-standalone-tables: 0
      max-title-length-in-parented-tables: 0

      themes:
        show-chooser: true

    graphql:
      api-variant: query_with_mutations_non_spec_compliant
      authentication:
        fallback:
          username: "graphql"
          roles:
            - "org.apache.causeway.applib.services.sudo.SudoService#accessAll"

  testing:
    fixtures:
      fixture-scripts-specification:
        context-class: petclinic.webapp.application.fixture.scenarios.PetClinicDemo
        run-script-default: petclinic.webapp.application.fixture.scenarios.PetClinicDemo
        recreate: petclinic.webapp.application.fixture.scenarios.PetClinicDemo
        non-persisted-objects-strategy: persist
        multiple-execution-strategy: execute

eclipselink:
  # if enabled, then must be run with JVM arg:
  # -javaagent:lib/spring-instrument-5.3.8.jar
  weaving: false
  # if weaving subproperties are required, then specify all eclipselink.weaving
  # properties using application.properties instead (it's not possible to
  # specify both eclipselink.weaving property and its subproperties using yaml syntax)

resteasy:
  jaxrs:
    app:
      registration: beans
    defaultPath: "/restful"

server:
  max-http-header-size: 16KB

spring:
  banner:
    location: banner.txt

  quartz:
    job-store-type: memory
  graphql:
    graphiql:
      enabled: true
      path: "/graphiql"

management:
  endpoint:
    auditevents:
      enabled: false
    beans:
      enabled: false
    caches:
      enabled: false
    configprops:
      enabled: false
    conditions:
      enabled: false
    env:
      enabled: false
    flyway:
      enabled: false
    heapdump:
      enabled: false
    health:
      enabled: true
      probes:
        enabled: false
    httptrace:
      enabled: false
    info:
      enabled: false
    integrationgraph:
      enabled: false
    jolokia:
      enabled: false
    liquibase:
      enabled: false
    logfile:
      enabled: false
    loggers:
      enabled: false
    metrics:
      enabled: false
    prometheus:
      enabled: false
    quartz:
      enabled: false
    sessions:
      enabled: false
    shutdown:
      enabled: false
    startup:
      enabled: false
    scheduledtasks:
      enabled: false
    threaddump:
      enabled: false
  endpoints:
    web:
      exposure:
        include:
          - health
      discovery:
        enabled: false

